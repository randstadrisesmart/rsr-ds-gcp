# RSR Data Science Group — Infrastructure as Code
#
# Forked from GoogleCloudPlatform/solutions-terraform-cloudbuild-gitops
#
# How it works:
#   Push to branch named after an environment → Cloud Build runs terraform apply.
#   Push to any other branch → terraform init + plan only (validation).
#
# Environments:
#   ops — Cloud Build triggers, build SAs, PubSub, Artifact Registry, secrets
#   dev — Runtime SA + IAM for rsr-ds-group-dev-f193
#   prd — Runtime SA + IAM + Cloud Run service defs for rsr-ds-group-prd-83ad

steps:
- id: 'branch name'
  name: 'alpine'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      echo "***********************"
      echo "$BRANCH_NAME"
      echo "***********************"

- id: 'tf init'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform init
      else
        for dir in environments/*/
        do
          cd ${dir}
          env=${dir%*/}
          env=${env#*/}
          echo ""
          echo "*************** TERRAFORM INIT ******************"
          echo "******* At environment: ${env} ********"
          echo "*************************************************"
          terraform init || exit 1
          cd ../../
        done
      fi

- id: 'tf plan'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform plan
      else
        for dir in environments/*/
        do
          cd ${dir}
          env=${dir%*/}
          env=${env#*/}
          echo ""
          echo "*************** TERRAFORM PLAN ******************"
          echo "******* At environment: ${env} ********"
          echo "*************************************************"
          terraform plan || exit 1
          cd ../../
        done
      fi

- id: 'tf apply'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform apply -auto-approve
      else
        echo "***************************** SKIPPING APPLY *************************************"
        echo "Branch '$BRANCH_NAME' does not match an environment (ops, dev, prd)."
        echo "Only plan was run. Merge to an environment branch to apply."
        echo "*********************************************************************************"
      fi

options:
  logging: CLOUD_LOGGING_ONLY
