# RSR Data Science Group — Infrastructure as Code
#
# Forked from GoogleCloudPlatform/solutions-terraform-cloudbuild-gitops
#
# How it works:
#   Push to branch named after an environment → Cloud Build runs terraform apply.
#   Push to any other branch → terraform init + plan only (validation).
#
# Environments:
#   ops — Cloud Build triggers, build SAs, PubSub, Artifact Registry, secrets
#   dev — Runtime SA + IAM for rsr-ds-group-dev-f193
#   prod — Runtime SA + IAM + Cloud Run service defs for rsr-ds-group-prd-83ad

steps:
- id: 'branch name'
  name: 'alpine'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      echo "***********************"
      echo "$BRANCH_NAME"
      echo "***********************"

- id: 'tf init'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform init
      else
        for dir in environments/*/
        do
          cd ${dir}
          env=${dir%*/}
          env=${env#*/}
          echo ""
          echo "*************** TERRAFORM INIT ******************"
          echo "******* At environment: ${env} ********"
          echo "*************************************************"
          terraform init || exit 1
          cd ../../
        done
      fi

- id: 'tf plan'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform plan
      else
        for dir in environments/*/
        do
          cd ${dir}
          env=${dir%*/}
          env=${env#*/}
          echo ""
          echo "*************** TERRAFORM PLAN ******************"
          echo "******* At environment: ${env} ********"
          echo "*************************************************"
          terraform plan || exit 1
          cd ../../
        done
      fi

- id: 'tf apply'
  name: 'hashicorp/terraform:1.7.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ -d "environments/$BRANCH_NAME/" ]; then
        cd environments/$BRANCH_NAME
        terraform apply -auto-approve
      else
        echo "***************************** SKIPPING APPLY *************************************"
        echo "Branch '$BRANCH_NAME' does not match an environment (ops, dev, prod)."
        echo "Only plan was run. Merge to an environment branch to apply."
        echo "*********************************************************************************"
      fi

- id: 'trigger sync'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
      if [ "$BRANCH_NAME" != "ops" ]; then
        echo "Skipping sync trigger — only runs on ops branch."
        exit 0
      fi

      SYNC_SA="svc-ai-platform-ops@rsr-ds-group-ops-d0b0.iam.gserviceaccount.com"
      echo "Triggering BQ scheduled queries as $SYNC_SA (data sync DEV → PRD)..."

      gcloud config set auth/impersonate_service_account "$SYNC_SA"

      CONFIGS="
        projects/383386831981/locations/us/transferConfigs/69bd0a50-0000-265e-8341-34c7e9483343
        projects/383386831981/locations/europe/transferConfigs/69bf5fbc-0000-255c-9673-d4f547fdbf74
        projects/383386831981/locations/us-east1/transferConfigs/69961a82-0000-2512-b232-883d24fc7848
        projects/383386831981/locations/europe-west1/transferConfigs/6999f2d7-0000-2b65-a30c-582429a8ef40
        projects/383386831981/locations/australia-southeast1/transferConfigs/69952757-0000-221b-996d-089e08280c1c
      "

      RUN_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      FAILED=0

      for CONFIG in $CONFIGS; do
        echo "Triggering: $CONFIG"
        if ! bq mk --transfer_run --run_time="$RUN_TIME" "$CONFIG"; then
          echo "WARNING: Failed to trigger $CONFIG"
          FAILED=1
        fi
      done

      gcloud config unset auth/impersonate_service_account

      if [ "$FAILED" -eq 1 ]; then
        echo "Some sync triggers failed — check above for details."
        exit 1
      fi

      echo "All 5 sync queries triggered."

options:
  logging: CLOUD_LOGGING_ONLY
