# deploy/pr-build.yaml — PR check (test + lint only)
#
# Triggered by: pull request to main
# SA: svc-build-{service}@rsr-ds-group-ops-d0b0.iam.gserviceaccount.com

steps:
  # ─── TEST ───────────────────────────────────────────────
  - id: 'test'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt -r requirements-test.txt
        pytest tests/ --cov=server --cov-report=term-missing
    waitFor: ['-']

  # ─── LINT ───────────────────────────────────────────────
  - id: 'lint'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install ruff
        ruff check . --exclude archive/
    waitFor: ['-']

  # ─── SCAN FOR HARDCODED SECRETS ────────────────────────
  - id: 'scan-secrets'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install detect-secrets
        BASELINE_FLAG=""
        if [ -f .secrets.baseline ]; then BASELINE_FLAG="--baseline .secrets.baseline"; fi
        OUTPUT=$(detect-secrets scan --all-files $$BASELINE_FLAG $(git ls-files))
        if [ -z "$$OUTPUT" ]; then echo "No new secrets detected."; exit 0; fi
        echo "$$OUTPUT" | python3 -c "
        import json,sys; r=json.load(sys.stdin)
        if r.get('results'):
            print('SECRETS FOUND:')
            for f,ss in r['results'].items():
                print(f'  {f}: {[s[\"type\"] for s in ss]}')
            sys.exit(1)
        print('No new secrets detected.')
        "
    waitFor: ['-']

  # ─── CHECK FILE SIZES ─────────────────────────────────
  - id: 'check-file-sizes'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        python3 -c "
        import os,sys
        big=[os.path.join(r,f) for r,d,fs in os.walk('.') for f in fs if os.path.getsize(os.path.join(r,f))>10_000_000 and '.git' not in r]
        if big:
            print('Files over 10MB (move to GCS):')
            for f in big: print(f'  {os.path.getsize(f)/1e6:.1f}MB {f}')
            sys.exit(1)
        print('No oversized files.')
        "
    waitFor: ['-']

options:
  logging: CLOUD_LOGGING_ONLY
