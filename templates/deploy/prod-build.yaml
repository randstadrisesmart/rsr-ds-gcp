# deploy/prod-build.yaml — Standard (no GPU)
#
# Triggered by: tag matching {service}-v*
# SA: svc-build-{service}@rsr-ds-group-ops-d0b0.iam.gserviceaccount.com
# Approval: MANUAL (Cloud Build approval gate)
#
# Copy this file to your service repo at deploy/prod-build.yaml
# and review the substitutions below for your service.

substitutions:
  # ── Review these — must match dev-build.yaml ──
  _SERVICE_NAME: CHANGE_ME             # e.g. taxonomy, cleanpii, digitaltwin
  _REGION: us-east1
  _MEMORY: 512Mi
  _CPU: '1'
  _TIMEOUT: '300'
  _STARTUP_PROBE_THRESHOLD: '30'      # must match dev-build.yaml
  # ── Do not change ──
  _PROJECT_DEV: rsr-ds-group-dev-f193
  _PROJECT_PRD: rsr-ds-group-prd-83ad
  _ENV: prd

steps:
  # NOTE: GCS data (if any) is already baked into the DEV image.
  # The prod pipeline copies that image — no re-download needed.

  # ─── COPY IMAGE: DEV AR → PRD AR ──────────────────────
  - id: 'copy-image'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}
        docker tag \
          ${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA} \
          ${_REGION}-docker.pkg.dev/${_PROJECT_PRD}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}
        docker push ${_REGION}-docker.pkg.dev/${_PROJECT_PRD}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}

        # Also tag as latest in prod
        docker tag \
          ${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA} \
          ${_REGION}-docker.pkg.dev/${_PROJECT_PRD}/docker-images/${_SERVICE_NAME}:latest
        docker push ${_REGION}-docker.pkg.dev/${_PROJECT_PRD}/docker-images/${_SERVICE_NAME}:latest

  # ─── DEPLOY TO PRD ─────────────────────────────────────
  - id: 'deploy-prd'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_PRD}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--project=${_PROJECT_PRD}'
      - '--region=${_REGION}'
      - '--service-account=svc-ai-platform@${_PROJECT_PRD}.iam.gserviceaccount.com'
      - '--set-env-vars=ENV=${_ENV},GCP_PROJECT_ID=${_PROJECT_PRD},BQ_PROJECT=${_PROJECT_PRD},GOOGLE_CLOUD_PROJECT=${_PROJECT_PRD}'
      - '--no-allow-unauthenticated'
      - '--min-instances=1'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--timeout=${_TIMEOUT}'
      - '--cpu-boost'
      - '--startup-probe=periodSeconds=10,failureThreshold=${_STARTUP_PROBE_THRESHOLD},tcpSocket.port=8080'
    waitFor: ['copy-image']

  # ─── ENABLE IAP (frontend services only) ───────────────
  - id: 'enable-iap'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_IAP}" = "true" ]; then
          gcloud run services update ${_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${_PROJECT_PRD} \
            --iap
        else
          echo "IAP not enabled for this service, skipping."
        fi
    waitFor: ['deploy-prd']

  # ─── NOTIFY SUCCESS (PubSub) ───────────────────────────
  - id: 'notify'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'pubsub'
      - 'topics'
      - 'publish'
      - 'pipelines_build_status'
      - '--project=rsr-ds-group-ops-d0b0'
      - '--message={"service":"${_SERVICE_NAME}","status":"success","commit":"${COMMIT_SHA}","env":"prd"}'
    waitFor: ['enable-iap']

options:
  logging: CLOUD_LOGGING_ONLY
