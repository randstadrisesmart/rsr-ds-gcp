# deploy/dev-build.yaml — Standard (no GPU)
#
# Triggered by: push to main branch
# SA: svc-build-{service}@rsr-ds-group-ops-d0b0.iam.gserviceaccount.com
#
# Copy this file to your service repo at deploy/dev-build.yaml
# and review the substitutions below for your service.

substitutions:
  # ── Review these for your service ──
  _SERVICE_NAME: CHANGE_ME             # e.g. taxonomy, cleanpii, digitaltwin
  _REGION: us-east1                    # change if co-locating with a dependency
  _MEMORY: 512Mi                       # increase for heavy model loading (e.g. 32Gi)
  _CPU: '1'                            # increase for heavy model loading (e.g. 4)
  _TIMEOUT: '300'                      # seconds — increase for slow startup (e.g. 1800)
  _STARTUP_PROBE_THRESHOLD: '30'       # failureThreshold — increase for slow startup (e.g. 180 = 30 min)
  # ── GCS data ——                     # to download files > 10GB during build. leave empty if none.
  _GCS_BUCKET: ''                      # e.g. location_object
  _GCS_DIRECTORIES: ''                 # space-separated dirs (e.g. 'models geojsonMaps data')
  # ── Do not change ──
  _PROJECT_DEV: rsr-ds-group-dev-f193
  _ENV: dev

steps:
  # ─── TEST ───────────────────────────────────────────────
  - id: 'test'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt -r requirements-test.txt
        pytest tests/ --cov=src --cov-report=term-missing

  # ─── LINT ───────────────────────────────────────────────
  - id: 'lint'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install ruff
        ruff check . --exclude archive/

  # ─── SCAN FOR HARDCODED SECRETS ────────────────────────
  - id: 'scan-secrets'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install detect-secrets
        EXCLUDE='\.git/.*'
        for dir in ${_GCS_DIRECTORIES}; do
          EXCLUDE="$EXCLUDE|^\./$dir/"
        done
        detect-secrets scan --all-files --exclude-files "$EXCLUDE" . | python3 -c "
        import json,sys; r=json.load(sys.stdin)
        if r.get('results'):
            print('SECRETS FOUND:')
            for f,ss in r['results'].items():
                print(f'  {f}: {[s[\"type\"] for s in ss]}')
            sys.exit(1)
        print('No secrets detected.')
        "

  # ─── CHECK FILE SIZES ─────────────────────────────────
  - id: 'check-file-sizes'
    name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        python3 -c "
        import os,sys
        big=[os.path.join(r,f) for r,d,fs in os.walk('.') for f in fs if os.path.getsize(os.path.join(r,f))>10_000_000 and '.git' not in r]
        if big:
            print('Files over 10MB (move to GCS):')
            for f in big: print(f'  {os.path.getsize(f)/1e6:.1f}MB {f}')
            sys.exit(1)
        print('No oversized files.')
        "

  # ─── DOWNLOAD GCS DATA ───
  - id: 'download-gcs-data'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "${_GCS_DIRECTORIES}" ]; then
          echo "No GCS data to download, skipping."
          exit 0
        fi
        for dir in ${_GCS_DIRECTORIES}; do
          echo "Downloading gs://${_GCS_BUCKET}/$dir ..."
          gcloud storage cp -r "gs://${_GCS_BUCKET}/$dir" "."
        done
    waitFor: ['-']

  # ─── BUILD ──────────────────────────────────────────────
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:latest'
      - '.'
    waitFor: ['test', 'lint', 'scan-secrets', 'check-file-sizes', 'download-gcs-data']

  # ─── PUSH ──────────────────────────────────────────────
  - id: 'push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}'
    waitFor: ['build']

  # ─── DEPLOY TO DEV ─────────────────────────────────────
  - id: 'deploy-dev'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_DEV}/docker-images/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--project=${_PROJECT_DEV}'
      - '--region=${_REGION}'
      - '--service-account=svc-ai-platform@${_PROJECT_DEV}.iam.gserviceaccount.com'
      - '--set-env-vars=ENV=${_ENV},GCP_PROJECT_ID=${_PROJECT_DEV},BQ_PROJECT=${_PROJECT_DEV},GOOGLE_CLOUD_PROJECT=${_PROJECT_DEV}'
      - '--no-allow-unauthenticated'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--timeout=${_TIMEOUT}'
      - '--cpu-boost'
      - '--startup-probe=periodSeconds=10,failureThreshold=${_STARTUP_PROBE_THRESHOLD},tcpSocket.port=8080'
    waitFor: ['push']

  # ─── ENABLE IAP (frontend services only) ───────────────
  - id: 'enable-iap'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_IAP}" = "true" ]; then
          gcloud run services update ${_SERVICE_NAME} \
            --region=${_REGION} \
            --project=${_PROJECT_DEV} \
            --iap
        else
          echo "IAP not enabled for this service, skipping."
        fi
    waitFor: ['deploy-dev']

  # ─── NOTIFY SUCCESS (PubSub) ───────────────────────────
  - id: 'notify'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'pubsub'
      - 'topics'
      - 'publish'
      - 'pipelines_build_status'
      - '--project=rsr-ds-group-ops-d0b0'
      - '--message={"service":"${_SERVICE_NAME}","status":"success","commit":"${COMMIT_SHA}","env":"dev"}'
    waitFor: ['enable-iap']

options:
  logging: CLOUD_LOGGING_ONLY
